<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jormungandr</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Background Canvas -->
    <canvas id="matrix-canvas"></canvas>

    <!-- Your Website Content Goes Here -->

    <div class="content-container">
        <div class="terminal-shell">
            <div class="header-container">
                <h1 class="glow-heading">Jormungandr</h1>
                <img src="ouroboros.png" id="ouroboros-logo" alt="Jormungandr">
                
            </div>
            <div class="subtitle">
                <span class="typed-text typed-text delay">&gt;&gt; serpent node engaged</span>
                <span class="typed-text delay">&gt;&gt; data stream: active</span>
            </div>
            <div class="nav-line typed-text delay ">
                <span class="nav-label terminal-link" :hover id="nav-label">>> opinions</span>
                <span class="arrow" id="arrow-left" onclick="navigate(-1)">&lt;</span>
                <span class="arrow" id="arrow-right" onclick="navigate(1)">&gt;</span>
            </div>
            <div class="blog-post" id="opinions-panel">
                <button class="return-link" id="return-home" type="button">&lt;&lt; return</button>
                <p class="blog-meta">// loading posts...</p>
            </div>
        </div>
    </div> 
    <!-- Matrix Animation Script -->
    <script src="matrix.js"></script>
    <script src="posts/post-index.js"></script>
    <script>
        const pages = ['>> opinions', '>> projects', '>> achievements',  '>> goals'];
        let current = 0;
        function navigate(direction) {
             // only navigate if opinions panel is closed
             if (panel.classList.contains('active')) return;
             current = (current + direction + pages.length) % pages.length;
             document.getElementById('nav-label').textContent = pages[current];
    }




        const POST_DIR = 'posts/';
        const toggle = document.getElementById('nav-label');
        const panel = document.getElementById('opinions-panel');
        const returnHome = document.getElementById('return-home');

        function parsePost(text, fallbackTitle) {
            const raw = text.trim();
            const lines = raw.replace(/\r\n/g, '\n').split('\n');
            let title = fallbackTitle || '';
            let contentLines = lines;

            if (contentLines[0] && contentLines[0].startsWith('# ')) {
                title = contentLines[0].replace(/^#\s*/, '').trim();
                contentLines = contentLines.slice(1);
            }

            const paragraphs = contentLines
                .join('\n')
                .split(/\n\s*\n/)
                .map((block) => block.trim())
                .filter(Boolean);

            return { title, paragraphs };
        }

        function renderPosts(posts) {
            if (!posts.length) {
                panel.innerHTML = '<p class="blog-meta">// no posts linked yet</p>';
                return;
            }

            panel.innerHTML = `
                
                ${posts.map((post, index) => {
                    const body = post.paragraphs.map((paragraph) => `<p>${paragraph.replace(/\n/g, '<br>')}</p>`).join('');
                    return `
                        <article class="post-entry">
                            <p class="blog-meta">// post ${index + 1}</p>
                            <h2>${post.title}</h2>
                            <div class="post-body">${body}</div>
                        </article>
                    `;
                }).join('')}
            `;

            const inlineReturn = document.getElementById('return-home-inline');
            if (inlineReturn) {
                inlineReturn.addEventListener('click', () => {
                    setPostsView(false);
                });
            }
        }

        async function loadPosts() {
            const posts = [];

            try {
                const response = await fetch(POST_DIR);
                const text = await response.text();
                const matches = [...text.matchAll(/href="([^"]+\.txt)"/g)];
                const paths = matches
                    .map((match) => match[1])
                    .filter((path) => path && path !== 'posts/')
                    .map((path) => (path.startsWith(POST_DIR) ? path : POST_DIR + path));

                for (const path of paths) {
                    const fileResponse = await fetch(path);
                    if (!fileResponse.ok) continue;
                    const fileText = await fileResponse.text();
                    posts.push(parsePost(fileText, path.split('/').pop().replace(/\.txt$/, '')));
                }
            } catch (error) {
                // Fall back to the local manifest when the browser cannot list the folder.
            }

            if (!posts.length && window.POSTS_FALLBACK) {
                posts.push(...window.POSTS_FALLBACK.map((post) => ({
                    title: post.title,
                    paragraphs: Array.isArray(post.paragraphs) ? post.paragraphs : [post.content]
                })));
            }

            renderPosts(posts);
        }

        loadPosts();

        function setPostsView(isOpen) {
            panel.classList.toggle('active', isOpen);
            document.body.classList.toggle('posts-open', isOpen);
            toggle.textContent = isOpen ? 'opinions: expanded' : '>> opinions';
            returnHome.style.display = isOpen ? 'inline-flex' : 'none';
            document.getElementById('ouroboros-logo').style.display = isOpen ? 'none' : 'block';

}

        toggle.addEventListener('click', () => {
            const isOpen = !panel.classList.contains('active');
            setPostsView(isOpen);
        });

        returnHome.addEventListener('click', () => {
            setPostsView(false);
        });

    </script>
</body>
</html>
